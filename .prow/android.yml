presubmits:
  - name: pull-banka-4-mobile-android-checks
    always_run: true
    decorate: true
    spec:
      containers:
        - image: harbor.k8s.elab.rs/base-images/base:gradle-21-node-22-docker
          name: code-style
          command:
            - /bin/bash
            - -c
            - |
              set -xe
              cd android-app

              # No usage of gradlew (instead use the incorrect gradle version
              # present on host) because the CI runner is on an awful network.
              failed=false
              fail() {
                failed=true
                echo E''R''R''O''R: a step failed
              }
              gradle assemble || fail
              gradle detekt || fail
              gradle lint || fail
              ! "${failed}"
